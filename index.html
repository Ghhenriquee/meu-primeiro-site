<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meu Primeiro Site</title>

    <style>
        body {
            background-color: #121212;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        h1 {
            color: #00ff88;
            font-size: 40px;
        }

        p {
            font-size: 18px;
        }

        button {
            background-color: #00ff88;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 8px;
        }

        button:hover {
            background-color: #00cc6a;
        }
    </style>

</head>
<body>

    <h1>Olá, eu sou Henrique 🚀👋</h1>
    <p>Estou construindo minha carreira em tecnologia 🚀</p>

    <button onclick="mostrarMensagem()">
        Clique aqui
    </button>

    <script>
        function mostrarMensagem() {
            alert("Você está evoluindo muito 🚀");
        }
    </script>

</body>
</html>
